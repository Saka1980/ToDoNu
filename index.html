<!doctype html>
<html lang="sv">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<title>ToDoNu</title>
<meta name="theme-color" content="#13100e">
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ToDoNu">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<link rel="stylesheet" href="fonts/fonts.css">
<style>
:root{--bg:#13100e;--bg2:#1e1916;--card:#211b17;--ink:#f4ede0;--soft:#a89c87;--faint:#5e554a;--line:#2e2823;--ember:#ff6b35;--amber:#f0a830;--idea:#7db4c4;--green:#7fa88f}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--ink);font-family:'Space Mono',monospace;min-height:100vh}
#app{max-width:620px;margin:0 auto;min-height:100vh;position:relative;overflow:hidden;padding-bottom:96px;background-image:radial-gradient(circle at 50% -8%,rgba(255,107,53,.12),transparent 55%)}
.top{display:flex;align-items:center;justify-content:space-between;padding:max(20px,env(safe-area-inset-top)) 22px 10px}
.logo{font-family:'Fraunces',serif;font-size:22px;font-weight:600;letter-spacing:-.02em}.logo i{color:var(--ember);font-style:normal}
.ver{font-family:'Space Mono',monospace;font-size:10px;font-weight:400;color:var(--faint);letter-spacing:0;margin-right:5px;vertical-align:middle}
.back{display:inline-flex;align-items:center;gap:6px;background:var(--card);border:1px solid var(--soft);color:var(--ink);height:44px;padding:0 16px 0 11px;border-radius:12px;cursor:pointer;font-family:inherit;font-size:14px;line-height:1;transition:.15s}
.back:hover{border-color:var(--ink)}.back:active{background:var(--bg2)}
.back .ba{font-size:21px;margin-top:-2px}
.glow{display:flex;align-items:center;gap:6px;font-size:14px;color:var(--soft)}
.glow .fl{font-size:15px}.glow .fl.lit{filter:drop-shadow(0 0 6px rgba(255,107,53,.8))}
.glow em{font-style:normal;font-size:12px;color:var(--faint)}
.body{padding:8px 22px 20px;animation:fade .25s}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.hero{margin:14px 2px 24px}
.greet{font-family:'Fraunces',serif;font-size:32px;font-weight:500;letter-spacing:-.01em}
.digest{color:var(--soft);margin-top:6px;font-size:14px}
.morning{position:relative;background:linear-gradient(120deg,rgba(255,107,53,.10),var(--card));border:1px solid var(--line);border-radius:16px;padding:18px 18px 16px;margin:14px 2px 22px;animation:fade .3s}
.morning .mg{font-family:'Fraunces',serif;font-size:28px;font-weight:500;letter-spacing:-.01em}
.morning .ms{color:var(--soft);margin-top:6px;font-size:14px;line-height:1.5}
.morning .mx{position:absolute;top:10px;right:12px;background:none;border:none;color:var(--faint);font-size:20px;line-height:1;cursor:pointer;padding:2px 4px}
.morning .mx:hover{color:var(--ink)}
.sec{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--faint);margin:24px 4px 10px}
.cardbtn{display:flex;align-items:center;gap:14px;width:100%;text-align:left;background:var(--card);border:1px solid var(--line);border-radius:16px;padding:16px;margin-bottom:10px;cursor:pointer;font-family:inherit;color:var(--ink);transition:.15s}
.cardbtn:hover{border-color:var(--soft)}
.cardbtn.inbox{background:linear-gradient(120deg,rgba(255,107,53,.10),var(--card))}
.cic{width:40px;height:40px;border-radius:11px;background:var(--bg2);display:flex;align-items:center;justify-content:center;color:var(--soft);flex:none;font-size:18px}
.cic .dot{width:14px;height:14px;border-radius:50%;background:radial-gradient(circle,var(--ember),#7a2d12)}
.cmain{flex:1;min-width:0}.cname{display:block;font-size:16px}.csub{display:block;font-size:12px;color:var(--faint);margin-top:3px}
.carr{color:var(--faint);flex:none;font-size:16px}
.grip{flex:none;display:flex;align-items:center;justify-content:center;width:46px;height:46px;margin:-12px -6px -12px 0;color:var(--soft);font-size:20px;line-height:1;cursor:grab;touch-action:none;border-radius:10px;letter-spacing:-1px}
.grip:hover{color:var(--ink);background:var(--bg2)}.grip:active{cursor:grabbing}
.proj{transition:transform .15s ease,box-shadow .12s,border-color .12s}
.proj.dragging{border-color:var(--ember);box-shadow:0 16px 32px -10px rgba(0,0,0,.7);position:relative;z-index:5;cursor:grabbing}
body.draglock{overflow:hidden;touch-action:none;overscroll-behavior:none}
.newproj{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;background:none;border:1px dashed var(--line);color:var(--soft);border-radius:16px;padding:14px;cursor:pointer;font-family:inherit;font-size:14px;margin-top:4px;transition:.15s}
.newproj:hover{border-color:var(--soft);color:var(--ink)}
.tools{display:flex;gap:16px;justify-content:center;margin:26px 4px 4px;flex-wrap:wrap}
.tlink{background:none;border:none;color:var(--faint);font-family:inherit;font-size:12px;cursor:pointer;padding:6px 4px;letter-spacing:.02em}
.tlink:hover{color:var(--soft)}
.warn{background:rgba(255,107,53,.10);border:1px solid var(--ember);border-radius:14px;padding:14px 16px;margin:14px 2px 18px;font-size:13px;line-height:1.5;color:var(--ink)}
.warn .wt{color:var(--ember);font-size:13px;margin-bottom:6px;font-weight:700}
.warn .wbtns{display:flex;gap:10px;margin-top:12px;flex-wrap:wrap}
.warn .wbtn{background:var(--ember);color:#13100e;border:none;font-family:inherit;font-weight:700;font-size:13px;padding:9px 14px;border-radius:10px;cursor:pointer}
.warn .wbtn.alt{background:none;border:1px solid var(--soft);color:var(--ink);font-weight:400}
.dhead{display:flex;align-items:center;justify-content:space-between;margin:14px 2px 22px}
.dhead h1{font-family:'Fraunces',serif;font-weight:500;font-size:30px;letter-spacing:-.01em}
.delproj{background:none;border:none;color:var(--faint);cursor:pointer;font-size:16px}.delproj:hover{color:var(--ember)}
.stream{margin-bottom:26px}
.shead{display:flex;align-items:center;gap:7px;font-size:12px;letter-spacing:.1em;text-transform:uppercase;color:var(--amber);margin-bottom:12px}
.shead.idea{color:var(--idea)}
.emptyline{color:var(--faint);font-size:13px;margin-bottom:6px;padding-left:4px}
.item{display:flex;align-items:flex-start;gap:10px;padding:12px 4px;border-bottom:1px solid var(--line);animation:fade .2s}
.check{position:relative;flex:none;width:24px;height:24px;margin-top:1px;border-radius:7px;border:2px solid var(--amber);background:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#13100e;transition:.15s;font-size:13px;font-weight:700}
.check:hover{background:rgba(240,168,48,.15)}
.check.on{background:var(--green);border-color:var(--green)}
.icontent{flex:1;min-width:0;display:flex;flex-direction:column;align-items:flex-start;gap:1px}
.ititle{font-size:15px;cursor:pointer;width:100%}
.clampable{line-height:1.5;word-break:break-word;overflow-wrap:anywhere}
.clampable.clamp{display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.moretoggle{background:none;border:none;color:var(--faint);font-family:inherit;font-size:12px;cursor:pointer;padding:3px 2px;letter-spacing:.02em}
.moretoggle:hover{color:var(--soft)}
.fromidea{color:var(--idea);font-size:12px;margin-left:5px}
.item.done .ititle{text-decoration:line-through;color:var(--faint)}
.ideadot{flex:none;width:9px;height:9px;border-radius:50%;background:var(--idea);margin:8px 0 0;box-shadow:0 0 8px rgba(125,180,196,.5)}
.item.idea .ititle{color:#d8d0c2}
.promote{flex:none;display:flex;align-items:center;justify-content:center;width:38px;height:38px;background:rgba(125,180,196,.12);border:1px solid transparent;color:var(--idea);font-size:19px;border-radius:11px;cursor:pointer;line-height:1}
.promote:hover{border-color:var(--idea)}
.del{flex:none;display:flex;align-items:center;justify-content:center;width:38px;height:38px;background:none;border:none;color:var(--faint);cursor:pointer;font-size:15px;border-radius:11px}
.del:hover{color:var(--ember)}
.prog{flex:none;font-size:11px;color:var(--faint);margin:9px 0 0 4px}.prog.all{color:var(--green)}
.steps{margin:0 0 12px 36px;display:flex;flex-direction:column}
.step{display:flex;align-items:flex-start;gap:10px;padding:7px 2px;animation:fade .2s}
.scheck{flex:none;width:18px;height:18px;margin-top:1px;border-radius:6px;border:2px solid var(--faint);background:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#13100e;font-size:11px;font-weight:700;transition:.15s}
.scheck:hover{border-color:var(--green)}.scheck.on{background:var(--green);border-color:var(--green)}
.stitle{font-size:13px;color:var(--soft);cursor:pointer;width:100%}
.step.done .stitle{text-decoration:line-through;color:var(--faint)}
.sdel{background:none;border:none;color:var(--faint);cursor:pointer;font-size:13px;flex:none;padding:2px 5px;margin-top:3px;opacity:.55}
.sdel:hover{color:var(--ember);opacity:1}
.addstep{align-self:flex-start;background:none;border:none;color:var(--faint);font-family:inherit;font-size:12px;cursor:pointer;padding:6px 2px}
.addstep:hover{color:var(--idea)}
.addhere{display:inline-flex;align-items:center;gap:6px;background:none;border:1px dashed var(--line);color:var(--soft);font-family:inherit;font-size:13px;cursor:pointer;padding:9px 14px;border-radius:12px;margin-top:10px;transition:.15s}
.addhere:hover{border-color:var(--soft);color:var(--ink)}
.burst{position:absolute;inset:0;pointer-events:none}
.burst i{position:absolute;top:50%;left:50%;width:5px;height:5px;border-radius:50%;background:var(--amber);transform:translate(-50%,-50%);animation:spark var(--d) ease-out forwards}
.burst i.big{background:var(--ember);box-shadow:0 0 6px var(--ember)}
@keyframes spark{0%{opacity:1;transform:translate(-50%,-50%) rotate(var(--a)) translateY(0) scale(1)}100%{opacity:0;transform:translate(-50%,-50%) rotate(var(--a)) translateY(-28px) scale(.3)}}
.cap{display:flex;flex-direction:column;align-items:center;padding-top:40px}
.status{margin:0 0 4px;color:var(--soft);font-size:13px;text-align:center}
.field{width:100%;max-width:420px;margin-top:14px;background:none;border:none;border-bottom:2px solid var(--line);outline:none;font-family:'Fraunces',serif;font-size:22px;color:var(--ink);padding:8px 2px;text-align:center}
.field:focus{border-color:var(--ember)}.field::placeholder{color:var(--faint);font-style:italic}
.extra{width:100%;max-width:420px;margin-top:26px;animation:fade .2s}
.crow{display:flex;align-items:center;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.clbl{font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--faint);width:100%;margin-bottom:2px}
.pill{display:inline-flex;align-items:center;gap:6px;background:var(--bg2);border:1px solid var(--line);color:var(--soft);font-family:inherit;font-size:13px;padding:8px 13px;border-radius:18px;cursor:pointer;transition:.15s}
.pill:hover{border-color:var(--soft)}.pill.on{color:var(--ink);border-color:var(--ink);background:var(--card)}
.addbtn{width:100%;margin-top:6px;display:flex;align-items:center;justify-content:center;gap:8px;background:var(--ember);color:#13100e;border:none;font-family:inherit;font-weight:700;font-size:15px;padding:15px;border-radius:14px;cursor:pointer}
.fab{position:fixed;bottom:max(22px,env(safe-area-inset-bottom));right:22px;width:58px;height:58px;border-radius:50%;background:var(--ember);color:#13100e;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 12px 30px -8px rgba(255,107,53,.6);z-index:50;font-size:26px}
.ioshint{position:fixed;left:12px;right:12px;bottom:max(16px,env(safe-area-inset-bottom));z-index:60;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:13px 14px;display:flex;align-items:center;gap:10px;font-size:13px;line-height:1.45;color:var(--soft);box-shadow:0 14px 34px -10px rgba(0,0,0,.75);animation:fade .3s}
.ioshint b{color:var(--ink);font-weight:400}.ioshint .sh{color:var(--ember)}
.ioshint>span{flex:1;min-width:0}
.ioshint .x{flex:none;background:none;border:none;color:var(--faint);font-size:20px;line-height:1;cursor:pointer;padding:2px 4px}
.ioshint .inst{flex:none;background:var(--ember);color:#13100e;border:none;font-family:inherit;font-weight:700;font-size:13px;padding:9px 15px;border-radius:10px;cursor:pointer}
.sheet-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:80;animation:fade .2s}
.sheet{position:fixed;left:0;right:0;bottom:0;z-index:81;background:var(--bg2);border-top:1px solid var(--line);border-radius:20px 20px 0 0;padding:20px 18px max(20px,env(safe-area-inset-bottom));max-width:620px;margin:0 auto;animation:slideup .25s}
@keyframes slideup{from{transform:translateY(100%)}to{transform:none}}
.sheet-t{font-family:'Fraunces',serif;font-size:18px;margin-bottom:16px}
.sheet-row{display:flex;align-items:center;gap:12px}
.sheet-f{flex:1;min-width:0;display:block;background:none;border:none;border-bottom:2px solid var(--line);outline:none;font-family:'Fraunces',serif;font-size:20px;line-height:1.4;color:var(--ink);padding:8px 2px;resize:none;max-height:40vh;overflow-y:auto}
.sheet-f:focus{border-color:var(--ember)}.sheet-f::placeholder{color:var(--faint);font-style:italic}
.sheet-actions{display:flex;justify-content:flex-end;gap:10px;margin-top:22px}
.sheet-cancel{background:none;border:1px solid var(--line);color:var(--soft);font-family:inherit;font-size:14px;padding:11px 18px;border-radius:12px;cursor:pointer}
.sheet-ok{background:var(--ember);color:#13100e;border:none;font-family:inherit;font-weight:700;font-size:14px;padding:11px 22px;border-radius:12px;cursor:pointer}
</style>
</head>
<body>
<div id="app"></div>
<script>
const KEY="nu-projekt-v1";
const VER="1.12";
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,6);
const isoD=d=>d.toISOString().slice(0,10);
const today=()=>isoD(new Date());
const yest=()=>{const d=new Date();d.setDate(d.getDate()-1);return isoD(d)};

let s={projects:[],items:[],actions:[],stats:{streak:0,lastActive:"",todayDate:"",todayCount:0,ideasRealized:0},view:"list",cur:null};
let cap={draft:"",dest:"inbox",kind:"task"};
let audio=null;
let loadError=false;
let capMsg="";
let drag=null,suppressOpen=false;
let actionsCollapsed=true;

function seedIfEmpty(){
  s.projects=[{id:"p_studie",name:"StudiePlan",createdAt:Date.now()}];
  s.items=[
    {id:"i1",projectId:"p_studie",type:"task",title:"Läsa kapitel 4",done:false,createdAt:Date.now()},
    {id:"i2",projectId:"p_studie",type:"idea",title:"Spela in sammanfattningar som ljud att lyssna på",done:false,createdAt:Date.now()},
    {id:"i3",projectId:null,type:"task",title:"Boka tvättid",done:false,createdAt:Date.now()}
  ];
}
function load(){const raw=localStorage.getItem(KEY);if(raw==null||raw===""){seedIfEmpty();return}try{const r=JSON.parse(raw);if(r&&r.projects){s.projects=r.projects;s.items=r.items||[];s.actions=r.actions||[];s.stats=Object.assign(s.stats,r.stats||{})}else seedIfEmpty()}catch(e){loadError=true;try{if(!localStorage.getItem(KEY+"-korrupt"))localStorage.setItem(KEY+"-korrupt",raw)}catch(_){}}}
function save(){localStorage.setItem(KEY,JSON.stringify({projects:s.projects,items:s.items,actions:s.actions,stats:s.stats}))}
function esc(t){return(t||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;")}

function chime(big){try{const C=window.AudioContext||window.webkitAudioContext;if(!C)return;if(!audio)audio=new C();if(audio.state==="suspended")audio.resume();const t0=audio.currentTime;(big?[523.25,659.25,783.99,1046.5]:[659.25,987.77]).forEach((f,i)=>{const o=audio.createOscillator(),g=audio.createGain();o.type="sine";o.frequency.value=f;o.connect(g);g.connect(audio.destination);const t=t0+i*0.06;g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(0.16,t+0.02);g.gain.exponentialRampToValueAtTime(0.001,t+0.4);o.start(t);o.stop(t+0.45)})}catch(e){}}
function bumpStreak(){const td=today();let st=s.stats;if(st.lastActive===td){}else if(st.lastActive===yest())st.streak+=1;else if(st.lastActive)st.streak=Math.max(1,st.streak-1);else st.streak=1;st.todayCount=(st.todayDate===td?st.todayCount:0);st.lastActive=td;st.todayDate=td}

function completeTask(id){
  const it=s.items.find(x=>x.id===id);if(!it)return;
  chime(!!it.fromIdea);
  const el=document.getElementById("chk_"+id);
  if(el){const b=document.createElement("span");b.className="burst";const n=it.fromIdea?12:7;for(let i=0;i<n;i++){const p=document.createElement("i");if(it.fromIdea)p.className="big";p.style.setProperty("--a",(360/n*i)+"deg");p.style.setProperty("--d",(0.3+Math.random()*0.3)+"s");b.appendChild(p)}el.appendChild(b)}
  setTimeout(()=>{bumpStreak();s.stats.todayCount+=1;if(it.fromIdea)s.stats.ideasRealized+=1;it.done=true;it.completedAt=Date.now();if(it.steps)it.steps.forEach(st=>st.done=true);save();render()},430);
}
function uncomplete(id){const it=s.items.find(x=>x.id===id);if(it){it.done=false;save();render()}}
function removeItem(id){s.items=s.items.filter(x=>x.id!==id);save();render()}
function promote(id){const it=s.items.find(x=>x.id===id);if(it){it.type="task";it.fromIdea=true;save();render()}}
function addItem(){const t=cap.draft.trim();if(!t)return;s.items.push({id:uid(),projectId:cap.dest==="inbox"?null:cap.dest,type:cap.kind,title:t,done:false,createdAt:Date.now()});cap.draft="";cap.kind="task";capMsg="✓ Tillagt — fånga nästa";save();render();setTimeout(()=>{const f=document.getElementById("field");if(f)try{f.focus()}catch(e){}},40)}
function addStep(taskId){const it=s.items.find(x=>x.id===taskId);if(!it)return;openSheet("Ny deluppgift","",val=>{if(!it.steps)it.steps=[];it.steps.push({id:uid(),title:val,done:false});save();render()})}
function removeStep(taskId,stepId){const it=s.items.find(x=>x.id===taskId);if(!it||!it.steps)return;it.steps=it.steps.filter(st=>st.id!==stepId);save();render()}
function editItem(id){const it=s.items.find(x=>x.id===id);if(!it)return;openSheet("Ändra texten",it.title,val=>{it.title=val;save();render()})}
function editStep(taskId,stepId){const it=s.items.find(x=>x.id===taskId);if(!it||!it.steps)return;const st=it.steps.find(x=>x.id===stepId);if(!st)return;openSheet("Ändra steget",st.title,val=>{st.title=val;save();render()})}
function toggleStep(taskId,stepId){const it=s.items.find(x=>x.id===taskId);if(!it||!it.steps)return;const st=it.steps.find(x=>x.id===stepId);if(!st)return;st.done=!st.done;const row=document.getElementById("step_"+taskId+"_"+stepId);if(row){row.classList.toggle("done",st.done);const c=row.querySelector(".scheck");if(c){c.classList.toggle("on",st.done);c.textContent=st.done?"✓":""}}const dn=it.steps.filter(x=>x.done).length;const pr=document.getElementById("prog_"+taskId);if(pr){pr.textContent=dn+"/"+it.steps.length;pr.classList.toggle("all",dn===it.steps.length&&dn>0)}save()}
function addProject(){openSheet("Nytt projekt","",val=>{const id=uid();s.projects.push({id,name:val,createdAt:Date.now()});s.cur=id;s.view="detail";save();render()})}
function addHere(kind){const pid=s.cur==="inbox"?null:s.cur;openSheet(kind==="idea"?"Ny idé":"Ny uppgift","",val=>{s.items.push({id:uid(),projectId:pid,type:kind,title:val,done:false,createdAt:Date.now()});save();render()})}
let sheet=null;
function growField(el){if(!el)return;el.style.height="auto";el.style.height=el.scrollHeight+"px"}
function openSheet(title,initial,onConfirm){closeSheet();sheet={onConfirm};const bg=document.createElement("div");bg.className="sheet-bg";bg.id="sheetbg";bg.onclick=closeSheet;const el=document.createElement("div");el.className="sheet";el.id="sheet";el.innerHTML='<div class="sheet-t">'+esc(title)+'</div><div class="sheet-row"><textarea id="sheetfield" class="sheet-f" rows="1" placeholder="Skriv eller diktera…"></textarea></div><div class="sheet-actions"><button class="sheet-cancel">Avbryt</button><button class="sheet-ok">Klar</button></div>';document.body.appendChild(bg);document.body.appendChild(el);const inp=el.querySelector("#sheetfield");inp.value=initial||"";inp.oninput=()=>growField(inp);inp.onkeydown=e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();confirmSheet()}};setTimeout(()=>{try{inp.focus()}catch(e){};growField(inp)},60);el.querySelector(".sheet-cancel").onclick=closeSheet;el.querySelector(".sheet-ok").onclick=confirmSheet}
function confirmSheet(){const inp=document.getElementById("sheetfield");if(!inp)return;const v=inp.value.trim();const cb=sheet&&sheet.onConfirm;closeSheet();if(v&&cb)cb(v)}
function closeSheet(){const bg=document.getElementById("sheetbg");if(bg)bg.remove();const el=document.getElementById("sheet");if(el)el.remove();sheet=null}
function removeProject(id){s.projects=s.projects.filter(p=>p.id!==id);s.items.forEach(x=>{if(x.projectId===id)x.projectId=null});s.view="list";save();render()}
function exportData(){const payload={app:"ToDoNu",ver:VER,exportedAt:Date.now(),data:{projects:s.projects,items:s.items,actions:s.actions,stats:s.stats}};const blob=new Blob([JSON.stringify(payload,null,2)],{type:"application/json"});const url=URL.createObjectURL(blob);const a=document.createElement("a");a.href=url;a.download="todonu-backup-"+today()+".json";document.body.appendChild(a);a.click();a.remove();setTimeout(()=>URL.revokeObjectURL(url),1500)}
function pickImport(){const inp=document.createElement("input");inp.type="file";inp.accept="application/json,.json";inp.onchange=()=>{if(inp.files&&inp.files[0])importData(inp.files[0])};inp.click()}
function importData(file){const r=new FileReader();r.onload=()=>{let d;try{const parsed=JSON.parse(r.result);d=parsed&&parsed.data?parsed.data:parsed}catch(e){alert("Kunde inte läsa filen – är det en ToDoNu-backup?");return}if(!d||!Array.isArray(d.projects)){alert("Filen ser inte ut som en ToDoNu-backup.");return}if(!confirm("Importera ersätter all data på den här enheten. Fortsätt?"))return;s.projects=d.projects;s.items=Array.isArray(d.items)?d.items:[];s.actions=Array.isArray(d.actions)?d.actions:[];s.stats=Object.assign({streak:0,lastActive:"",todayDate:"",todayCount:0,ideasRealized:0},d.stats||{});loadError=false;s.view="list";s.cur=null;save();render()};r.onerror=()=>alert("Kunde inte läsa filen.");r.readAsText(file)}
function exportRaw(){const raw=localStorage.getItem(KEY+"-korrupt")||"";const blob=new Blob([raw],{type:"application/json"});const url=URL.createObjectURL(blob);const a=document.createElement("a");a.href=url;a.download="todonu-rakopia-"+today()+".json";document.body.appendChild(a);a.click();a.remove();setTimeout(()=>URL.revokeObjectURL(url),1500)}
function go(v){capMsg="";s.view=v;if(v==="capture"){cap.draft="";render();setTimeout(()=>{const f=document.getElementById("field");if(f)try{f.focus()}catch(e){}},60);return}render()}
function openProj(id){if(suppressOpen)return;s.cur=id;s.view="detail";render()}

function toggleExtra(){const el=document.getElementById("extra");if(el)el.style.display=cap.draft.trim()?"":"none"}
function greeting(){const h=new Date().getHours();return h<10?"God morgon":h<18?"Hej":"God kväll"}
function morningDigest(){
  const openT=s.items.filter(i=>!i.done&&i.type==="task").length;
  const inbox=s.items.filter(i=>!i.projectId&&!i.done).length;
  let line;
  if(openT===0&&inbox===0)line="Rent bord. Fånga en tanke när den kommer.";
  else{const parts=[];if(openT>0)parts.push(openT+(openT===1?" uppgift väntar":" uppgifter väntar"));if(inbox>0)parts.push(inbox+" i inkorgen att sortera");line=parts.join(" · ")+".";}
  return '<div class="morning"><button class="mx" onclick="dismissMorning(this)" aria-label="Stäng">×</button><p class="mg">God morgon.</p><p class="ms">'+line+'</p></div>';
}
function dismissMorning(btn){const c=btn.closest(".morning");if(c)c.remove()}
function pstats(id){const its=s.items.filter(i=>i.projectId===id);return{tasks:its.filter(i=>i.type==="task"&&!i.done).length,ideas:its.filter(i=>i.type==="idea").length}}

function render(){
  const app=document.getElementById("app");
  const td=today();
  let h='<div class="top">';
  h+=(s.view==="detail"||s.view==="capture")?'<button class="back" onclick="go(\'list\')"><span class="ba">‹</span>Tillbaka</button>':'<span class="logo"><span class="ver">v'+VER+'</span>ToDo<i>Nu</i></span>';
  h+='<div class="glow"><span class="fl '+(s.stats.streak>0?"lit":"")+'">🔥</span><span>'+s.stats.streak+'</span>'+(s.stats.todayDate===td&&s.stats.todayCount>0?'<em>· '+s.stats.todayCount+' klara idag</em>':'')+'</div></div>';

  if(s.view==="list"){
    const inbox=s.items.filter(i=>!i.projectId&&!i.done);
    const dueT=s.items.filter(i=>!i.done&&i.type==="task").length;
    const mh=new Date().getHours();
    const showMorning=mh>=4&&mh<12&&localStorage.getItem("nu-morning")!==td;
    if(showMorning)localStorage.setItem("nu-morning",td);
    h+='<div class="body">';
    if(loadError)h+='<div class="warn"><div class="wt">⚠ Kunde inte läsa sparad data</div>Inget har skrivits över — en råkopia av den oläsbara filen är sparad på enheten. Ladda ner den, eller återställ från en tidigare säkerhetskopia.<div class="wbtns"><button class="wbtn" onclick="exportRaw()">↓ Ladda ner råkopia</button><button class="wbtn alt" onclick="pickImport()">↑ Importera backup</button></div></div>';
    h+=(showMorning?morningDigest():'<div class="hero"><p class="greet">'+greeting()+'.</p><p class="digest">'+(dueT>0?dueT+(dueT===1?" uppgift väntar.":" uppgifter väntar."):"Inget brådskar — fånga en tanke.")+'</p></div>');
    if(inbox.length>0)h+='<button class="cardbtn inbox" onclick="openProj(\'inbox\')"><div class="cic">📥</div><div class="cmain"><span class="cname">Inkorg</span><span class="csub">'+inbox.length+' osorterade</span></div><span class="carr">→</span></button>';
    h+='<div class="sec">Projekt</div>';
    h+='<div id="projlist">';
    s.projects.forEach(p=>{const st=pstats(p.id);h+='<div class="cardbtn proj" data-pid="'+p.id+'" role="button" tabindex="0" onclick="openProj(\''+p.id+'\')"><div class="cic"><span class="dot"></span></div><div class="cmain"><span class="cname">'+esc(p.name)+'</span><span class="csub">'+st.tasks+' uppgifter · '+st.ideas+' idéer</span></div><span class="grip" title="Dra för att flytta" aria-label="Flytta projekt" onclick="event.stopPropagation()">≡</span><span class="carr">→</span></div>'});
    h+='</div>';
    h+='<button class="newproj" onclick="addProject()">＋ Nytt projekt</button>';
    h+='<div class="tools"><button class="tlink" onclick="exportData()">↓ Exportera säkerhetskopia</button><button class="tlink" onclick="pickImport()">↑ Importera</button></div></div>';
  }

  if(s.view==="detail"){
    const isInbox=s.cur==="inbox";const proj=s.projects.find(p=>p.id===s.cur);
    const its=s.items.filter(i=>isInbox?!i.projectId:i.projectId===s.cur);
    const tasks=its.filter(i=>i.type==="task");const ideas=its.filter(i=>i.type==="idea");
    h+='<div class="body"><div class="dhead"><h1>'+(isInbox?"Inkorg":esc(proj?proj.name:""))+'</h1>'+(!isInbox&&proj?'<button class="delproj" onclick="removeProject(\''+proj.id+'\')">🗑</button>':'')+'</div>';
    h+='<div class="stream"><div class="shead">▸ Uppgifter</div>';
    if(tasks.filter(t=>!t.done).length===0)h+='<p class="emptyline">Inga öppna uppgifter.</p>';
    tasks.filter(t=>!t.done).forEach(t=>{
      const hasSteps=t.steps&&t.steps.length>0;const dn=hasSteps?t.steps.filter(x=>x.done).length:0;
      h+='<div class="item"><button class="check" id="chk_'+t.id+'" onclick="completeTask(\''+t.id+'\')"></button><div class="icontent"><span class="ititle clampable clamp" onclick="editItem(\''+t.id+'\')">'+esc(t.title)+(t.fromIdea?'<span class="fromidea">💡</span>':'')+'</span><button class="moretoggle" hidden onclick="toggleMore(this)">visa mer</button></div>'+(hasSteps?'<span class="prog" id="prog_'+t.id+'">'+dn+'/'+t.steps.length+'</span>':'')+'<button class="del" onclick="removeItem(\''+t.id+'\')">🗑</button></div>';
      h+='<div class="steps" id="steps_'+t.id+'">';
      if(hasSteps)t.steps.forEach(st=>{h+='<div class="step'+(st.done?' done':'')+'" id="step_'+t.id+'_'+st.id+'"><button class="scheck'+(st.done?' on':'')+'" onclick="toggleStep(\''+t.id+'\',\''+st.id+'\')">'+(st.done?'✓':'')+'</button><div class="icontent"><span class="stitle clampable clamp" onclick="editStep(\''+t.id+'\',\''+st.id+'\')">'+esc(st.title)+'</span><button class="moretoggle" hidden onclick="toggleMore(this)">visa mer</button></div><button class="sdel" onclick="removeStep(\''+t.id+'\',\''+st.id+'\')">×</button></div>'});
      h+='<button class="addstep" onclick="addStep(\''+t.id+'\')">＋ steg</button></div>';
    });
    tasks.filter(t=>t.done).forEach(t=>{h+='<div class="item done"><button class="check on" onclick="uncomplete(\''+t.id+'\')">✓</button><div class="icontent"><span class="ititle clampable clamp" onclick="editItem(\''+t.id+'\')">'+esc(t.title)+'</span><button class="moretoggle" hidden onclick="toggleMore(this)">visa mer</button></div><button class="del" onclick="removeItem(\''+t.id+'\')">🗑</button></div>'});
    h+='<button class="addhere" onclick="addHere(\'task\')">＋ uppgift</button>';
    h+='</div><div class="stream"><div class="shead idea">💡 Idéer</div>';
    if(ideas.length===0)h+='<p class="emptyline">Inga idéer än.</p>';
    ideas.forEach(t=>{h+='<div class="item idea"><span class="ideadot"></span><div class="icontent"><span class="ititle clampable clamp" onclick="editItem(\''+t.id+'\')">'+esc(t.title)+'</span><button class="moretoggle" hidden onclick="toggleMore(this)">visa mer</button></div><button class="promote" title="Gör till uppgift" onclick="promote(\''+t.id+'\')">→</button><button class="del" onclick="removeItem(\''+t.id+'\')">🗑</button></div>'});
    h+='<button class="addhere" onclick="addHere(\'idea\')">＋ idé</button>';
    h+='</div></div>';
  }

  if(s.view==="capture"){
    h+='<div class="body cap">';
    h+='<p class="status">'+(capMsg||"Skriv eller diktera med tangentbordets mic")+'</p>';
    h+='<input id="field" class="field" placeholder="Vad tänker du på?" value="'+esc(cap.draft)+'" oninput="cap.draft=this.value;toggleExtra()" onkeydown="if(event.key===\'Enter\')addItem()">';
    h+='<div id="extra" class="extra" style="'+(cap.draft.trim()?"":"display:none")+'"><div class="crow"><span class="clbl">Det här är en</span><button class="pill '+(cap.kind==="task"?"on":"")+'" onclick="cap.kind=\'task\';render()">▸ Uppgift</button><button class="pill '+(cap.kind==="idea"?"on":"")+'" onclick="cap.kind=\'idea\';render()">💡 Idé</button></div>';
    h+='<div class="crow"><span class="clbl">Lägg i</span><button class="pill '+(cap.dest==="inbox"?"on":"")+'" onclick="cap.dest=\'inbox\';render()">📥 Inkorg</button>';
    s.projects.forEach(p=>{h+='<button class="pill '+(cap.dest===p.id?"on":"")+'" onclick="cap.dest=\''+p.id+'\';render()">'+esc(p.name)+'</button>'});
    h+='</div><button class="addbtn" onclick="addItem()">＋ Lägg till</button></div>';
    h+='</div>';
  }

  if(s.view==="list")h+='<button class="fab" onclick="go(\'capture\')">＋</button>';
  app.innerHTML=h;
  applyClamps();
  setupProjectDrag();
}
function applyClamps(){
  document.querySelectorAll(".icontent").forEach(blk=>{
    const t=blk.querySelector(".clampable"),b=blk.querySelector(".moretoggle");
    if(!t||!b)return;
    b.hidden=!(t.classList.contains("clamp")&&t.scrollHeight>t.clientHeight+1);
  });
}
function toggleMore(btn){
  const t=btn.parentNode.querySelector(".clampable");if(!t)return;
  t.classList.toggle("clamp");
  btn.textContent=t.classList.contains("clamp")?"visa mer":"visa mindre";
}
// Dra projekt: lyssnar på document (mus/touch levererar alltid move-event dit
// — inget beroende av pointer-capture som tappades på touch/desktop tidigare).
// Kortet flyttas via transform, grannarna glider, sidan låses mot scroll under
// draget, och s.projects sorteras om en gång vid släpp.
let dragMoveH=null,dragUpH=null;
function setupProjectDrag(){
  const list=document.getElementById("projlist");if(!list)return;
  list.addEventListener("pointerdown",onListPointerDown);
}
function onListPointerDown(e){
  if(drag||e.button>0)return;
  const g=e.target.closest(".grip");if(!g)return;
  const card=g.closest(".proj");if(!card)return;
  const list=card.parentNode;
  e.preventDefault();
  const cards=[...list.querySelectorAll(".proj")];
  const index=cards.indexOf(card);
  const slotH=card.offsetHeight+10; // .cardbtn margin-bottom:10
  drag={el:card,id:e.pointerId,startY:e.clientY,cards,index,target:index,slotH,moved:false};
  card.classList.add("dragging");card.style.transition="none";
  document.body.classList.add("draglock");
  dragMoveH=gripMove;dragUpH=gripUp;
  document.addEventListener("pointermove",dragMoveH,{passive:false});
  document.addEventListener("pointerup",dragUpH);
  document.addEventListener("pointercancel",dragUpH);
}
function shiftNeighbors(){
  const {cards,index,target,slotH,el}=drag;
  cards.forEach((c,i)=>{
    if(c===el)return;
    let ty=0;
    if(target>index){if(i>index&&i<=target)ty=-slotH}
    else if(target<index){if(i>=target&&i<index)ty=slotH}
    c.style.transform=ty?"translateY("+ty+"px)":"";
  });
}
function gripMove(e){
  if(!drag||e.pointerId!==drag.id)return;
  const dy=e.clientY-drag.startY;
  if(!drag.moved){if(Math.abs(dy)<4)return;drag.moved=true}
  if(e.cancelable)e.preventDefault();
  drag.el.style.transform="translateY("+dy+"px)";
  let t=drag.index+Math.round(dy/drag.slotH);
  t=Math.max(0,Math.min(drag.cards.length-1,t));
  if(t!==drag.target){drag.target=t;shiftNeighbors()}
}
function gripUp(e){
  if(!drag||e.pointerId!==drag.id)return;
  document.removeEventListener("pointermove",dragMoveH);
  document.removeEventListener("pointerup",dragUpH);
  document.removeEventListener("pointercancel",dragUpH);
  document.body.classList.remove("draglock");
  const {el,cards,index,target,moved}=drag;
  cards.forEach(c=>{c.style.transform="";c.style.transition=""});
  el.classList.remove("dragging");
  drag=null;
  if(moved&&target!==index){
    const[p]=s.projects.splice(index,1);
    s.projects.splice(target,0,p);
    suppressOpen=true;setTimeout(()=>{suppressOpen=false},120);
    save();render();
  }
}
async function persistStorage(){try{if(navigator.storage&&navigator.storage.persist)await navigator.storage.persist()}catch(e){}}
function iosHint(){try{
  const ua=navigator.userAgent||"";
  const isIos=/iphone|ipad|ipod/i.test(ua);
  const standalone=("standalone" in navigator&&navigator.standalone)||matchMedia("(display-mode: standalone)").matches;
  if(!isIos||standalone||localStorage.getItem("nu-ios-hint")==="dismissed")return;
  const el=document.createElement("div");el.className="ioshint";
  el.innerHTML='<span>Lägg till på hemskärmen: tryck <span class="sh">Dela</span> och välj <b>Lägg till på hemskärmen</b>.</span><button class="x" aria-label="Stäng">×</button>';
  el.querySelector(".x").onclick=()=>{localStorage.setItem("nu-ios-hint","dismissed");el.remove()};
  document.body.appendChild(el);
}catch(e){}}
let deferredPrompt=null;
function showInstall(){
  if(document.getElementById("installbar"))return;
  if(matchMedia("(display-mode: standalone)").matches)return;
  if(localStorage.getItem("nu-install-hint")==="dismissed")return;
  const el=document.createElement("div");el.id="installbar";el.className="ioshint";
  el.innerHTML='<span>Installera <b>ToDoNu</b> — snabb åtkomst och funkar offline.</span><button class="inst">Installera</button><button class="x" aria-label="Stäng">×</button>';
  el.querySelector(".inst").onclick=async()=>{if(!deferredPrompt)return;deferredPrompt.prompt();try{await deferredPrompt.userChoice}catch(e){}deferredPrompt=null;el.remove()};
  el.querySelector(".x").onclick=()=>{localStorage.setItem("nu-install-hint","dismissed");el.remove()};
  document.body.appendChild(el);
}
window.addEventListener("beforeinstallprompt",e=>{e.preventDefault();deferredPrompt=e;showInstall()});
window.addEventListener("appinstalled",()=>{deferredPrompt=null;const el=document.getElementById("installbar");if(el)el.remove()});
load();render();persistStorage();iosHint();
if("serviceWorker" in navigator){window.addEventListener("load",()=>{navigator.serviceWorker.register("sw.js").catch(()=>{})})}
</script>
